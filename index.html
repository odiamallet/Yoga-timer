<title>Yoga Timer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f14;color:#e8e4dc;min-height:100vh;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100dvh;max-height:100dvh}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.nav{display:flex;border-top:.5px solid #2a2a38;background:#0f0f14;flex-shrink:0}
.nav-btn{flex:1;padding:12px 8px 16px;background:none;border:none;color:#7a7a9a;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-btn.active{color:#c4a882}
.page{display:none;padding:14px 16px 0;max-width:440px;margin:0 auto;width:100%}
.page.active{display:flex;flex-direction:column}

/* Timer page */
.timer-circle{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:12px auto;width:200px;height:200px;border-radius:50%;background:#1a1a24;position:relative;flex-shrink:0}
.timer-circle svg.ring{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-time{font-size:38px;font-weight:300;letter-spacing:2px;color:#e8e4dc;font-variant-numeric:tabular-nums}
.timer-label{font-size:11px;color:#7a7a9a;margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.interval-info{text-align:center;margin-bottom:10px;min-height:38px}
.interval-name{font-size:15px;color:#c4a882}
.interval-next{font-size:12px;color:#7a7a9a;margin-top:3px}
.controls{display:flex;gap:12px;justify-content:center;margin-bottom:12px}
.ctrl-btn{width:52px;height:52px;border-radius:50%;border:.5px solid #2a2a38;background:#1a1a24;color:#e8e4dc;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{transform:scale(.93);background:#252535}
.ctrl-btn.primary{width:64px;height:64px;background:#3a3050;border-color:#534AB7}
.ctrl-btn.primary:active{background:#4a3f68}
.ctrl-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.ctrl-btn.primary svg{width:23px;height:23px}
.vol-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:9px 13px;background:#1a1a24;border:.5px solid #2a2a38;border-radius:10px}
.vol-row svg{width:16px;height:16px;stroke:#7a7a9a;fill:none;stroke-width:1.5;flex-shrink:0}
.vol-row input[type=range]{flex:1;accent-color:#534AB7;cursor:pointer}
.vol-pct{font-size:12px;color:#7a7a9a;min-width:32px;text-align:right}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#7a7a9a;margin-bottom:7px}
.saved-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.saved-item{background:#1a1a24;border:.5px solid #2a2a38;border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;-webkit-tap-highlight-color:transparent}
.saved-item:active{background:#222230}
.saved-item.selected{border-color:#534AB7;background:#1e1a30}
.si-name{font-size:14px;color:#e8e4dc}
.si-meta{font-size:12px;color:#7a7a9a;margin-top:2px}
.icon-btn{background:none;border:none;color:#5a5a7a;cursor:pointer;padding:6px;-webkit-tap-highlight-color:transparent;line-height:0}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;display:block}
.icon-btn:active{color:#c4a882}
.icon-btn.del:active{color:#c05050}
.icon-btn:disabled{opacity:.25;pointer-events:none}
.empty-state{text-align:center;color:#5a5a7a;font-size:14px;padding:22px 0}
.wakelock-dot{width:6px;height:6px;border-radius:50%;background:#5a5a7a;margin-left:6px;display:inline-block;vertical-align:middle}
.wakelock-dot.active{background:#6ab87a}

/* Edit page */
.edit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.edit-header h2{font-size:16px;font-weight:500;color:#e8e4dc}
.cancel-btn{background:none;border:none;color:#7a7a9a;font-size:14px;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent}
.cancel-btn:active{color:#e8e4dc}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:#7a7a9a;margin-bottom:4px}
.field input,.field select{width:100%;background:#1a1a24;border:.5px solid #2a2a38;border-radius:8px;color:#e8e4dc;padding:9px 11px;font-size:14px;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:#534AB7}
.field select option{background:#1a1a24}
.bell-row{display:flex;gap:7px;align-items:center;margin-bottom:7px}
.bell-row label{font-size:12px;color:#7a7a9a;width:75px;flex-shrink:0}
.bell-row select{flex:1;background:#1a1a24;border:.5px solid #2a2a38;border-radius:8px;color:#e8e4dc;padding:7px 9px;font-size:13px;outline:none;-webkit-appearance:none}
.test-btn{padding:6px 10px;background:#1a1a24;border:.5px solid #2a2a38;border-radius:8px;color:#7a7a9a;cursor:pointer;font-size:12px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.test-btn:active{color:#c4a882}

/* Interval cards */
.intervals-list{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.iv-card{background:#1a1a24;border:.5px solid #2a2a38;border-radius:12px;overflow:hidden}

/* Interval section inside card */
.iv-section{padding:10px 12px}
.iv-section + .iv-section{border-top:.5px solid #252535}
.iv-section-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#7a7a9a;margin-bottom:7px}
.iv-section-label.rest-lbl{color:#534AB7}

.iv-name-row{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.iv-name{background:transparent;border:none;border-bottom:.5px solid #2a2a38;border-radius:0;color:#e8e4dc;padding:3px 0;font-size:14px;font-weight:500;flex:1;outline:none;-webkit-appearance:none}
.iv-name:focus{border-color:#534AB7}
.iv-del{background:none;border:none;color:#5a5a7a;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent;line-height:0;flex-shrink:0}
.iv-del svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;display:block}
.iv-del:active{color:#c05050}

/* Duration + sound row — same layout for interval and rest */
.iv-dur-sound{display:flex;gap:7px;align-items:center;margin-bottom:6px}
.dur-grp{display:flex;align-items:center;gap:3px;flex-shrink:0}
.dinp{width:48px;background:#131320;border:.5px solid #2a2a38;border-radius:6px;color:#e8e4dc;padding:5px 6px;font-size:13px;outline:none;text-align:center;-webkit-appearance:none}
.dinp:focus{border-color:#534AB7}
.dlbl{font-size:12px;color:#7a7a9a}
.iv-sel{background:#131320;border:.5px solid #2a2a38;border-radius:6px;color:#e8e4dc;padding:5px 7px;font-size:12px;outline:none;flex:1;-webkit-appearance:none}

/* Repeat row — below rest to make clear rest repeats too */
.iv-repeat-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#131320;border-top:.5px solid #252535}
.iv-repeat-row .dlbl{font-size:12px;color:#7a7a9a}
.rinp{width:42px;background:#1a1a24;border:.5px solid #2a2a38;border-radius:6px;color:#e8e4dc;padding:5px 6px;font-size:13px;outline:none;text-align:center;-webkit-appearance:none}
.repeat-hint{font-size:11px;color:#5a5a7a;flex:1}

/* Rest toggle */
.rest-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;-webkit-tap-highlight-color:transparent;padding-top:2px}
.rest-toggle input[type=checkbox]{accent-color:#534AB7;width:15px;height:15px;cursor:pointer;flex-shrink:0}
.rest-toggle span{font-size:12px;color:#7a7a9a}

/* Add btn */
.add-btn{width:100%;padding:10px;background:none;border:.5px dashed #2a2a38;border-radius:8px;color:#7a7a9a;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-tap-highlight-color:transparent}
.add-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.5}
.add-btn:active{border-color:#534AB7;color:#c4a882}

/* Save buttons */
.btn-row{display:flex;gap:8px;margin-top:8px;margin-bottom:20px}
.save-btn{flex:1;padding:13px;background:#3a3050;border:.5px solid #534AB7;border-radius:10px;color:#e8e4dc;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.save-btn:active{background:#4a3f68}
.save-btn.secondary{background:#1a1a24;border-color:#2a2a38;color:#c4a882;font-size:13px}
.save-btn.secondary:active{background:#252535}

/* Toast & modal */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#2a2a38;border:.5px solid #3a3a50;border-radius:8px;padding:9px 16px;font-size:13px;color:#c4a882;opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;white-space:nowrap}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#1a1a24;border:.5px solid #2a2a38;border-radius:14px;padding:22px 18px;width:100%;max-width:360px}
.modal h3{font-size:16px;font-weight:500;color:#e8e4dc;margin-bottom:6px}
.modal p{font-size:13px;color:#7a7a9a;margin-bottom:16px}
.modal input{width:100%;background:#131320;border:.5px solid #2a2a38;border-radius:8px;color:#e8e4dc;padding:10px 12px;font-size:14px;outline:none;-webkit-appearance:none;margin-bottom:14px}
.modal input:focus{border-color:#534AB7}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:11px;border-radius:9px;cursor:pointer;font-size:14px;border:none;-webkit-tap-highlight-color:transparent}
.modal-cancel{background:#252535;color:#7a7a9a}
.modal-confirm{background:#3a3050;color:#e8e4dc;border:.5px solid #534AB7 !important}
.modal-confirm:active{background:#4a3f68}
</style>
</head>
<body>
<div class="app">
  <div class="scroll">

    <!-- TIMER PAGE -->
    <div class="page active" id="page-timer">
      <div style="text-align:center;padding:5px 0 0">
        <div style="font-size:13px;color:#7a7a9a;display:flex;align-items:center;justify-content:center;gap:4px">
          <span id="session-label">No session selected</span>
          <span class="wakelock-dot" id="wakelockDot"></span>
        </div>
      </div>
      <div class="timer-circle">
        <svg class="ring" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="94" stroke="#252535" stroke-width="3" fill="none"/>
          <circle id="progressRing" cx="100" cy="100" r="94" stroke="#534AB7" stroke-width="3" fill="none" stroke-dasharray="591" stroke-dashoffset="591" stroke-linecap="round"/>
        </svg>
        <div class="timer-time" id="timerDisplay">00:00</div>
        <div class="timer-label" id="timerSub">ready</div>
      </div>
      <div class="interval-info">
        <div class="interval-name" id="currentIntervalName">—</div>
        <div class="interval-next" id="nextIntervalInfo"></div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="btnReset">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="ctrl-btn primary" id="btnPlay">
          <svg id="playIconSvg" viewBox="0 0 24 24" style="fill:#e8e4dc;stroke:none"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="ctrl-btn" id="btnSkip">
          <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>
      <div class="vol-row">
        <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <input type="range" id="volSlider" min="0" max="100" value="80">
        <span class="vol-pct" id="volPct">80%</span>
      </div>
      <div style="margin-bottom:10px">
        <div class="sec-title">sessions</div>
        <div class="saved-list" id="timerSessionList"></div>
        <div class="empty-state" id="timerEmptyState" style="display:none">No sessions yet — create one in the Edit tab</div>
      </div>
    </div>

    <!-- EDIT PAGE -->
    <div class="page" id="page-edit">
      <div class="edit-header">
        <h2 id="editPageTitle">New session</h2>
        <button class="cancel-btn" id="btnCancel">Cancel</button>
      </div>
      <div id="editorPanel">
        <div class="field">
          <label>Session name</label>
          <input type="text" id="editName" placeholder="Morning flow">
        </div>
        <div style="margin-bottom:11px">
          <div class="sec-title" style="margin-bottom:6px">start bell</div>
          <div class="bell-row">
            <label>Sound</label>
            <select id="startBellSound"></select>
            <button class="test-btn" onclick="testBell('startBellSound')">Test</button>
          </div>
        </div>
        <div style="margin-bottom:11px">
          <div class="sec-title" style="margin-bottom:6px">end bell</div>
          <div class="bell-row">
            <label>Sound</label>
            <select id="endBellSound"></select>
            <button class="test-btn" onclick="testBell('endBellSound')">Test</button>
          </div>
        </div>
        <div style="margin-bottom:8px">
          <div class="sec-title" style="margin-bottom:6px">intervals</div>
          <div class="intervals-list" id="intervalsList"></div>
          <button class="add-btn" id="btnAddInterval">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add interval
          </button>
        </div>
        <div class="btn-row" id="saveBtnRow"></div>
      </div>
    </div>

  </div>
  <div class="nav">
    <button class="nav-btn active" id="nav-timer" onclick="showPage('timer')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Timer
    </button>
    <button class="nav-btn" id="nav-edit" onclick="startNewSession()">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
  </div>
</div>

<div class="modal-overlay" id="saveAsModal" style="display:none">
  <div class="modal">
    <h3>Save as new session</h3>
    <p>Enter a name for the duplicate session</p>
    <input type="text" id="saveAsName" placeholder="Session name">
    <div class="modal-btns">
      <button class="modal-cancel" id="saveAsCancel">Cancel</button>
      <button class="modal-confirm" id="saveAsConfirm">Save copy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const BELL_OPTS = [['none','None'],['chime','Chime'],['chime_clear','Clear bell'],['gong','Gong'],['tibet','Tibetan bowl'],['zen_gong','Zen gong']];
const CIRC = 2 * Math.PI * 94;

// ── AUDIO ─────────────────────────────────────────────────
let audioCtx = null;
const audioBuffers = {};

function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed')
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function preloadSounds() {
  const ctx = getAudioCtx();
  await Promise.all(Object.entries(SOUNDS).map(async ([key, dataUrl]) => {
    try {
      const resp = await fetch(dataUrl);
      const arr = await resp.arrayBuffer();
      audioBuffers[key] = await ctx.decodeAudioData(arr);
    } catch(e) { console.warn('preload failed', key, e); }
  }));
}

let volume = parseFloat(localStorage.getItem('yogaVol') || '0.8');

function playBell(type, times) {
  if (!type || type === 'none') return;
  const buf = audioBuffers[type];
  if (!buf) return;
  const ctx = getAudioCtx();
  const count = times || 1;
  for (let i = 0; i < count; i++) {
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer = buf;
    gain.gain.value = volume;
    src.connect(gain);
    gain.connect(ctx.destination);
    // Stagger multiple rings by the buffer duration
    src.start(ctx.currentTime + i * (buf.duration + 0.4));
  }
}

function testBell(selId) { playBell(document.getElementById(selId).value); }

const volSlider = document.getElementById('volSlider');
const volPct = document.getElementById('volPct');
volSlider.value = Math.round(volume * 100);
volPct.textContent = Math.round(volume * 100) + '%';
volSlider.addEventListener('input', () => {
  volume = volSlider.value / 100;
  volPct.textContent = volSlider.value + '%';
  localStorage.setItem('yogaVol', volume);
});

// ── WAKE LOCK ─────────────────────────────────────────────
let wakeLock = null;
const wakelockDot = document.getElementById('wakelockDot');

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakelockDot.classList.add('active');
    wakeLock.addEventListener('release', () => { wakelockDot.classList.remove('active'); wakeLock = null; });
  } catch(e) {}
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
  wakelockDot.classList.remove('active');
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && timerState.running) {
    await requestWakeLock();
    timerState.lastWall = null;
  }
});

// ── BACKGROUND WORKER ─────────────────────────────────────
const workerCode = `let t=null;self.onmessage=e=>{if(e.data==='start'){if(t)clearInterval(t);t=setInterval(()=>self.postMessage('tick'),200);}else if(e.data==='stop'){if(t){clearInterval(t);t=null;}}};`;
const timerWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type:'application/javascript'})));

// ── STATE ─────────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('yogaSess7') || '[]');
let selectedId = localStorage.getItem('yogaSel7') || null;
let editingId = null;
let editIntervals = [];
let timerState = { running: false, stepIdx: 0, elapsed: 0, lastWall: null };

function saveSessions() { localStorage.setItem('yogaSess7', JSON.stringify(sessions)); }
function getSession(id) { return sessions.find(s => s.id === id); }
function getSelected() { return selectedId ? getSession(selectedId) : null; }

// restBellTimes: 1 = once, 2 = twice
function expandSteps(session) {
  const steps = [];
  session.intervals.forEach(iv => {
    const reps = Math.max(1, iv.repeat || 1);
    for (let r = 0; r < reps; r++) {
      const sfx = reps > 1 ? ' (' + (r+1) + '/' + reps + ')' : '';
      steps.push({ name: iv.name + sfx, duration: iv.duration, bell: iv.bell, bellTimes: 1 });
      if (iv.hasRest && iv.restDuration > 0) {
        steps.push({
          name: (iv.restName || 'Rest') + sfx,
          duration: iv.restDuration,
          bell: iv.restBell || iv.bell,
          bellTimes: iv.restBellTimes || 1,
          isRest: true
        });
      }
    }
  });
  if (steps.length) steps[steps.length - 1].isLast = true;
  return steps;
}

function totalDuration(session) {
  return session.intervals.reduce((a, iv) => {
    const reps = Math.max(1, iv.repeat || 1);
    return a + iv.duration * reps + (iv.hasRest && iv.restDuration > 0 ? iv.restDuration * reps : 0);
  }, 0);
}

function fmtTime(sec) {
  const s = Math.max(0, Math.ceil(sec));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function fmtDur(sec) {
  if (!sec) return '0s';
  if (sec < 60) return sec + 's';
  const m = Math.floor(sec/60), s = sec%60;
  return m + 'm' + (s ? s+'s' : '');
}
function updateRing(frac) {
  document.getElementById('progressRing').style.strokeDashoffset = CIRC - Math.min(frac,1)*CIRC;
}
function bellOptionsHtml(current) {
  return BELL_OPTS.map(([v,l]) => `<option value="${v}"${v===current?' selected':''}>${l}</option>`).join('');
}
// Bell options for rest — includes "×2" variants
function restBellOptionsHtml(ivBell, currentBell, currentTimes) {
  const opts = [];
  opts.push(['none', 'None', 1]);
  BELL_OPTS.filter(([v]) => v !== 'none').forEach(([v, l]) => {
    opts.push([v, l, 1]);
    opts.push([v, l + ' ×2', 2]);
  });
  return opts.map(([v, l, t]) => {
    const sel = (v === currentBell && t === currentTimes) ? ' selected' : '';
    return `<option value="${v}|${t}"${sel}>${l}</option>`;
  }).join('');
}

function populateBellSelects() {
  ['startBellSound','endBellSound'].forEach(id => {
    document.getElementById(id).innerHTML = bellOptionsHtml('none');
  });
}
populateBellSelects();

// ── NAVIGATION ────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='timer') renderTimerSessions();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function startNewSession() {
  editingId = null;
  renderEditor();
  showPage('edit');
  document.getElementById('nav-edit').classList.add('active');
}

// Cancel button — go back to timer, no changes
document.getElementById('btnCancel').addEventListener('click', () => {
  editingId = null;
  showPage('timer');
  document.getElementById('nav-timer').classList.add('active');
  document.getElementById('nav-edit').classList.remove('active');
});

// ── TIMER SESSION LIST ────────────────────────────────────
function renderTimerSessions() {
  const list = document.getElementById('timerSessionList');
  const empty = document.getElementById('timerEmptyState');
  list.innerHTML = '';
  if (!sessions.length) { empty.style.display=''; updateTimerUI(); return; }
  empty.style.display = 'none';
  sessions.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'saved-item' + (s.id===selectedId?' selected':'');
    const steps = expandSteps(s).length;
    div.innerHTML = `<div style="min-width:0;flex:1">
      <div class="si-name">${s.name}</div>
      <div class="si-meta">${steps} step${steps!==1?'s':''} · ${fmtDur(totalDuration(s))}</div>
    </div>
    <div style="display:flex;align-items:center;flex-shrink:0">
      <button class="icon-btn" title="Move up" ${i===0?'disabled':''} onclick="moveSession('${s.id}',-1,event)">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="icon-btn" title="Move down" ${i===sessions.length-1?'disabled':''} onclick="moveSession('${s.id}',1,event)">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="icon-btn" title="Duplicate" onclick="duplicateSession('${s.id}',event)">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="icon-btn" title="Edit" onclick="editSession('${s.id}',event)">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn del" title="Delete" onclick="deleteSession('${s.id}',event)">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>`;
    div.addEventListener('click', e => { if (!e.target.closest('.icon-btn')) selectSession(s.id); });
    list.appendChild(div);
  });
  updateTimerUI();
}

function updateTimerUI() {
  const s = getSelected();
  document.getElementById('session-label').textContent = s ? s.name : 'No session selected';
  if (timerState.running) return;
  if (s && s.intervals.length) {
    const steps = expandSteps(s);
    const idx = Math.min(timerState.stepIdx, steps.length-1);
    const step = steps[idx];
    document.getElementById('currentIntervalName').textContent = step ? step.name : '—';
    document.getElementById('timerDisplay').textContent = fmtTime(step ? step.duration : 0);
    document.getElementById('timerSub').textContent = 'ready';
    const nxt = steps[idx+1];
    document.getElementById('nextIntervalInfo').textContent = nxt ? 'Next: '+nxt.name+' ('+fmtDur(nxt.duration)+')' : '';
    updateRing(0);
  } else {
    document.getElementById('currentIntervalName').textContent = '—';
    document.getElementById('timerDisplay').textContent = '00:00';
    document.getElementById('timerSub').textContent = 'ready';
    document.getElementById('nextIntervalInfo').textContent = '';
    updateRing(0);
  }
}

function selectSession(id) {
  resetTimer(true); selectedId = id;
  localStorage.setItem('yogaSel7', id);
  renderTimerSessions();
}
function moveSession(id, dir, e) {
  e.stopPropagation();
  const idx = sessions.findIndex(s => s.id === id);
  const newIdx = idx + dir;
  if (idx === -1 || newIdx < 0 || newIdx >= sessions.length) return;
  [sessions[idx], sessions[newIdx]] = [sessions[newIdx], sessions[idx]];
  saveSessions();
  renderTimerSessions();
}
function deleteSession(id, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (selectedId===id) { selectedId=null; localStorage.removeItem('yogaSel7'); }
  saveSessions(); renderTimerSessions();
  showToast('Session deleted');
}
function duplicateSession(id, e) {
  e.stopPropagation();
  const src = getSession(id);
  if (!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = Date.now().toString();
  copy.name = src.name + ' (copy)';
  sessions.push(copy);
  saveSessions(); renderTimerSessions();
  showToast('Session duplicated');
}
function editSession(id, e) {
  e.stopPropagation();
  editingId = id;
  renderEditor();
  showPage('edit');
  document.getElementById('nav-edit').classList.add('active');
  document.getElementById('nav-timer').classList.remove('active');
}

// ── EDITOR ────────────────────────────────────────────────
function renderSaveBtns() {
  const row = document.getElementById('saveBtnRow');
  if (editingId) {
    row.innerHTML = `<button class="save-btn secondary" id="btnSaveAs">Save as new</button><button class="save-btn" id="btnSave">Save changes</button>`;
    document.getElementById('btnSave').addEventListener('click', () => doSave(false));
    document.getElementById('btnSaveAs').addEventListener('click', openSaveAsModal);
  } else {
    row.innerHTML = `<button class="save-btn" id="btnSave">Save session</button>`;
    document.getElementById('btnSave').addEventListener('click', () => doSave(false));
  }
}

function renderEditor() {
  const s = editingId ? getSession(editingId) : null;
  document.getElementById('editPageTitle').textContent = s ? 'Edit session' : 'New session';
  document.getElementById('editName').value = s ? s.name : '';
  document.getElementById('startBellSound').value = s ? (s.startBell||'chime') : 'chime';
  document.getElementById('endBellSound').value = s ? (s.endBell||'tibet') : 'tibet';
  editIntervals = s ? JSON.parse(JSON.stringify(s.intervals))
    : [{ name:'Warm up', mins:5, secs:0, bell:'chime', repeat:1,
         hasRest:false, restMins:1, restSecs:0, restName:'Rest', restBell:'chime', restBellTimes:1 }];
  renderIntervalRows();
  renderSaveBtns();
}

function collectFormData() {
  return {
    name: document.getElementById('editName').value.trim() || 'My Session',
    startBell: document.getElementById('startBellSound').value,
    endBell: document.getElementById('endBellSound').value,
    intervals: editIntervals
      .map(iv => ({ ...iv,
        duration: (iv.mins||0)*60+(iv.secs||0),
        repeat: Math.max(1, iv.repeat||1),
        restDuration: (iv.restMins||0)*60+(iv.restSecs||0)
      }))
      .filter(iv => iv.duration > 0)
  };
}

function doSave(asNew, overrideName) {
  const data = collectFormData();
  if (!data.intervals.length) { showToast('Add at least one interval with a duration'); return false; }
  if (asNew) {
    if (overrideName) data.name = overrideName;
    sessions.push({ id: Date.now().toString(), ...data });
    showToast('Saved as "' + data.name + '"');
  } else if (editingId) {
    Object.assign(getSession(editingId), data);
    showToast('Changes saved');
  } else {
    sessions.push({ id: Date.now().toString(), ...data });
    showToast('Session saved');
  }
  saveSessions(); editingId = null;
  showPage('timer');
  document.getElementById('nav-timer').classList.add('active');
  document.getElementById('nav-edit').classList.remove('active');
  return true;
}

function openSaveAsModal() {
  document.getElementById('saveAsName').value = (document.getElementById('editName').value.trim() || 'My Session') + ' (copy)';
  document.getElementById('saveAsModal').style.display = 'flex';
  setTimeout(() => document.getElementById('saveAsName').focus(), 100);
}
function closeSaveAsModal() { document.getElementById('saveAsModal').style.display = 'none'; }
document.getElementById('saveAsCancel').addEventListener('click', closeSaveAsModal);
document.getElementById('saveAsConfirm').addEventListener('click', () => {
  const name = document.getElementById('saveAsName').value.trim();
  if (!name) { document.getElementById('saveAsName').focus(); return; }
  closeSaveAsModal(); doSave(true, name);
});
document.getElementById('saveAsModal').addEventListener('click', e => {
  if (e.target === document.getElementById('saveAsModal')) closeSaveAsModal();
});

function renderIntervalRows() {
  const list = document.getElementById('intervalsList');
  list.innerHTML = '';
  editIntervals.forEach((iv, i) => {
    const card = document.createElement('div');
    card.className = 'iv-card';

    // Build rest bell options with current values
    const restBell = iv.restBell || iv.bell || 'chime';
    const restTimes = iv.restBellTimes || 1;
    const restBellHtml = restBellOptionsHtml(iv.bell, restBell, restTimes);

    const repeatHint = (iv.repeat > 1 && iv.hasRest)
      ? 'Interval + rest repeat ' + iv.repeat + ' times'
      : (iv.repeat > 1 ? 'Repeats ' + iv.repeat + ' times' : '');

    card.innerHTML = `
      <!-- INTERVAL SECTION -->
      <div class="iv-section">
        <div class="iv-section-label">Interval</div>
        <div class="iv-name-row">
          <input class="iv-name" type="text" placeholder="Interval name" value="${iv.name}" oninput="editIntervals[${i}].name=this.value">
          <button class="iv-del" onclick="removeInterval(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="iv-dur-sound">
          <div class="dur-grp">
            <input class="dinp" type="number" min="0" max="99" value="${iv.mins||0}" oninput="editIntervals[${i}].mins=Math.max(0,parseInt(this.value)||0)">
            <span class="dlbl">min</span>
            <input class="dinp" type="number" min="0" max="59" value="${iv.secs||0}" oninput="editIntervals[${i}].secs=Math.min(59,Math.max(0,parseInt(this.value)||0))">
            <span class="dlbl">sec</span>
          </div>
          <select class="iv-sel" onchange="editIntervals[${i}].bell=this.value">${bellOptionsHtml(iv.bell||'chime')}</select>
        </div>
        <label class="rest-toggle">
          <input type="checkbox" ${iv.hasRest?'checked':''} onchange="toggleRest(${i},this.checked)">
          <span>Add rest after this interval</span>
        </label>
      </div>

      <!-- REST SECTION (conditional) -->
      ${iv.hasRest ? `
      <div class="iv-section">
        <div class="iv-section-label rest-lbl">Rest</div>
        <div class="iv-name-row">
          <input class="iv-name" type="text" placeholder="Rest" value="${iv.restName||'Rest'}" oninput="editIntervals[${i}].restName=this.value">
        </div>
        <div class="iv-dur-sound">
          <div class="dur-grp">
            <input class="dinp" type="number" min="0" max="99" value="${iv.restMins||0}" oninput="editIntervals[${i}].restMins=Math.max(0,parseInt(this.value)||0)">
            <span class="dlbl">min</span>
            <input class="dinp" type="number" min="0" max="59" value="${iv.restSecs||0}" oninput="editIntervals[${i}].restSecs=Math.min(59,Math.max(0,parseInt(this.value)||0))">
            <span class="dlbl">sec</span>
          </div>
          <select class="iv-sel" onchange="setRestBell(${i},this.value)">${restBellHtml}</select>
        </div>
      </div>` : ''}

      <!-- REPEAT ROW — always at bottom so it's clear it applies to both -->
      <div class="iv-repeat-row">
        <span class="dlbl">Repeat</span>
        <input class="rinp" type="number" min="1" max="99" value="${iv.repeat||1}" oninput="editIntervals[${i}].repeat=Math.max(1,parseInt(this.value)||1);updateRepeatHint(${i},this)">
        <span class="repeat-hint" id="repeat-hint-${i}">${repeatHint}</span>
      </div>
    `;
    list.appendChild(card);
  });
}

function setRestBell(i, val) {
  const [bell, times] = val.split('|');
  editIntervals[i].restBell = bell;
  editIntervals[i].restBellTimes = parseInt(times) || 1;
}

function updateRepeatHint(i, input) {
  const reps = Math.max(1, parseInt(input.value)||1);
  editIntervals[i].repeat = reps;
  const hint = document.getElementById('repeat-hint-' + i);
  if (hint) {
    hint.textContent = (reps > 1 && editIntervals[i].hasRest)
      ? 'Interval + rest repeat ' + reps + ' times'
      : (reps > 1 ? 'Repeats ' + reps + ' times' : '');
  }
}

function toggleRest(i, checked) {
  editIntervals[i].hasRest = checked;
  if (checked) {
    if (!editIntervals[i].restName) editIntervals[i].restName = 'Rest';
    if (!editIntervals[i].restMins && !editIntervals[i].restSecs) { editIntervals[i].restMins = 1; editIntervals[i].restSecs = 0; }
    editIntervals[i].restBell = editIntervals[i].restBell || editIntervals[i].bell || 'chime';
    editIntervals[i].restBellTimes = editIntervals[i].restBellTimes || 1;
  }
  renderIntervalRows();
}

function removeInterval(i) { editIntervals.splice(i,1); renderIntervalRows(); }

document.getElementById('btnAddInterval').addEventListener('click', () => {
  editIntervals.push({ name:'Interval '+(editIntervals.length+1), mins:1, secs:0, bell:'chime', repeat:1,
    hasRest:false, restMins:1, restSecs:0, restName:'Rest', restBell:'chime', restBellTimes:1 });
  renderIntervalRows();
});

// ── WORKER TICK ───────────────────────────────────────────
timerWorker.onmessage = () => {
  if (!timerState.running) return;
  const now = Date.now();
  if (timerState.lastWall === null) { timerState.lastWall = now; return; }
  const delta = (now - timerState.lastWall) / 1000;
  timerState.lastWall = now;
  timerState.elapsed += delta;

  const s = getSelected();
  if (!s) return;
  const steps = expandSteps(s);

  while (timerState.stepIdx < steps.length && timerState.elapsed >= steps[timerState.stepIdx].duration) {
    const cur = steps[timerState.stepIdx];
    timerState.elapsed -= cur.duration;
    if (!cur.isLast) playBell(cur.bell, cur.bellTimes);
    timerState.stepIdx++;
    if (timerState.stepIdx >= steps.length) { finishSession(); return; }
  }

  if (timerState.stepIdx >= steps.length) { finishSession(); return; }
  const curStep = steps[timerState.stepIdx];
  const remaining = curStep.duration - timerState.elapsed;

  if (document.visibilityState === 'visible') {
    document.getElementById('timerDisplay').textContent = fmtTime(remaining);
    document.getElementById('currentIntervalName').textContent = curStep.name;
    document.getElementById('timerSub').textContent = fmtDur(curStep.duration) + ' interval';
    updateRing(timerState.elapsed / curStep.duration);
    const nxt = steps[timerState.stepIdx + 1];
    document.getElementById('nextIntervalInfo').textContent = nxt ? 'Next: '+nxt.name+' ('+fmtDur(nxt.duration)+')' : 'Last interval';
  }
};

// ── TIMER CONTROLS ────────────────────────────────────────
function setPlayIcon(playing) {
  const svg = document.getElementById('playIconSvg');
  svg.innerHTML = playing ? '<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>' : '<polygon points="5,3 19,12 5,21"/>';
  svg.style.fill='#e8e4dc'; svg.style.stroke='none';
}

function resetTimer(soft) {
  timerWorker.postMessage('stop');
  releaseWakeLock();
  timerState = { running:false, stepIdx:0, elapsed:0, lastWall:null };
  setPlayIcon(false);
  if (!soft) updateTimerUI();
}

function finishSession() {
  const s = getSelected();
  if (s) playBell(s.endBell, 1);
  timerWorker.postMessage('stop');
  releaseWakeLock();
  timerState.running = false;
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerSub').textContent = 'complete';
  document.getElementById('currentIntervalName').textContent = 'Done!';
  document.getElementById('nextIntervalInfo').textContent = '';
  updateRing(1); setPlayIcon(false);
  showToast('Session complete');
  if (document.visibilityState === 'hidden' && Notification.permission === 'granted')
    new Notification('Yoga Timer', { body: 'Your session is complete!', icon: ICON192 });
}

document.getElementById('btnPlay').addEventListener('click', async () => {
  const s = getSelected();
  if (!s || !s.intervals.length) { showToast('Select a session first'); return; }
  getAudioCtx();
  if (!timerState.running) {
    if (Notification.permission === 'default') Notification.requestPermission();
    await requestWakeLock();
    if (timerState.stepIdx === 0 && timerState.elapsed === 0)
      setTimeout(() => playBell(s.startBell, 1), 80);
    timerState.running = true; timerState.lastWall = null;
    setPlayIcon(true);
    timerWorker.postMessage('start');
  } else {
    timerState.running = false;
    timerWorker.postMessage('stop');
    releaseWakeLock();
    setPlayIcon(false);
  }
});

document.getElementById('btnReset').addEventListener('click', () => { resetTimer(false); updateTimerUI(); });

document.getElementById('btnSkip').addEventListener('click', () => {
  const s = getSelected();
  if (!s) return;
  const steps = expandSteps(s);
  const step = steps[timerState.stepIdx];
  if (step && !step.isLast) playBell(step.bell, step.bellTimes);
  timerState.stepIdx++; timerState.elapsed = 0; timerState.lastWall = null;
  if (timerState.stepIdx >= steps.length) { finishSession(); return; }
  if (!timerState.running) updateTimerUI();
});

// ── PWA ───────────────────────────────────────────────────
const manifest = {
  name:'Yoga Timer', short_name:'Yoga Timer',
  description:'Meditation and yoga interval timer',
  start_url:'.', display:'standalone',
  background_color:'#0f0f14', theme_color:'#0f0f14', orientation:'portrait',
  icons:[
    { src:ICON192, sizes:'192x192', type:'image/png', purpose:'any maskable' },
    { src:ICON512, sizes:'512x512', type:'image/png', purpose:'any maskable' }
  ]
};
const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const mLink = document.createElement('link');
mLink.rel='manifest'; mLink.href=URL.createObjectURL(mBlob);
document.head.appendChild(mLink);

if ('serviceWorker' in navigator) {
  const sw = `const C='yt-v3';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('')))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], {type:'application/javascript'})), {scope:'./'}).catch(()=>{});
}

preloadSounds().then(() => renderTimerSessions());
</script>
